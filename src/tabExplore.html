<script type="text/babel">
  const { useState, useMemo, useEffect, useRef } = React;
  const { GROWTH_METRICS, LANGUAGES, COUNTRIES, COLOR_PALETTE, DARK_MODE_PALETTE } = window;
  const { InputField, SelectField, ChartComponent, Modal, ChipsInput } = window;

  window.ExploreTab = ({
    keywords,
    setKeywords,
    runExplore,
    isExploring,
    exploreStatus,
    ideasData,
    setIdeasData,
    setClusters,
    setRelevantIdeas,
    setChartLabels,
    setSelectedCluster,
    language,
    setLanguage,
    country,
    setCountry,
    continent,
    setContinent,
    continentOptions,
    customLanguages,
    customCountries,
    handleCustomOption,
    promptTemplate,
    setPromptTemplate,
    seedChartData,
    clusters,
    growthMetric,
    setGrowthMetric,
    handleDownloadExplore,
    handleExportExploreToSheet,
    isExporting,
    clustersChartData,
    bubbleChartOptions,
    selectedCluster,
    selectedClusterChartData,
    chartLabels,
    relevantIdeas,
    useKeywordPlanner,
    setUseKeywordPlanner,
    useGemini,
    setUseGemini,
    geminiPrompt,
    setGeminiPrompt,
    useClustering,
    setUseClustering,
    highlightKeywordSources,
    setHighlightKeywordSources,
    theme,
    geminiConfig,
    onOpenSettings
  }) => {
              const palette = theme === 'dark' ? DARK_MODE_PALETTE : COLOR_PALETTE;
              const textColor = theme === 'dark' ? '#f1f5f9' : '#1e293b';
              const gridColor = theme === 'dark' ? '#334155' : '#e2e8f0';

              const searchVolumeDisclaimer = (
                <div style={{ padding: '0 1rem 1rem', fontSize: '0.8rem', color: 'var(--text-secondary)', marginTop: '8px', textAlign: 'center' }}>
                  * Search Volume is from the previous full month only and is limited by the <a href="https://developers.google.com/google-ads/api/docs/keyword-planning/generate-historical-metrics" target="_blank" rel="noopener noreferrer" style={{ color: 'inherit', textDecoration: 'underline' }}>Historical Metrics</a> endpoint from the Google Ads API.
                </div>
              );

              const promptCustomizationNote = (promptName) => (
                <p>
                  The {promptName} can be customized to your needs. Any changes you make are stored locally in your
                  browser and will only affect your current session, not other users of the application.
                </p>
              );

              const filteredCountries = useMemo(() => {
                if (continent === 'Custom Locations') {
                  return customCountries;
                }
                const countriesForContinent = window.REGION_MAP[continent] || [];
                return countriesForContinent;
              }, [continent, customCountries]);

              const [activeInfoModal, setActiveInfoModal] = useState(null);
              const detailsRef = useRef(null);

              useEffect(() => {
                if (highlightKeywordSources && detailsRef.current) {
                  detailsRef.current.open = true;
                }
              }, [highlightKeywordSources]);

              // Keyword Table State
              const [sortConfig, setSortConfig] = useState({
                key: 'growth',
                direction: 'descending',
              });
              const [filters, setFilters] = useState({ keyword: '', minVolume: '' });
              const [expandedIdea, setExpandedIdea] = useState(null);
              const [activeMetrics, setActiveMetrics] = window.useStickyState(
                ['yoy', 'mom', 'latest_vs_max'],
                'giga_activeMetrics'
              );
              const [isMetricsDropdownOpen, setIsMetricsDropdownOpen] = useState(false);
              const metricsDropdownRef = useRef(null);

              useEffect(() => {
                const handleClickOutside = event => {
                  if (metricsDropdownRef.current && !metricsDropdownRef.current.contains(event.target)) {
                    setIsMetricsDropdownOpen(false);
                  }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
              }, []);

              const requestSort = key => {
                let direction = 'descending';
                if (sortConfig.key === key && sortConfig.direction === 'descending') {
                  direction = 'ascending';
                }
                setSortConfig({ key, direction });
              };

              const getSortIndicator = key => {
                if (sortConfig.key !== key) return null;
                return sortConfig.direction === 'ascending' ? ' ↑' : ' ↓';
              };

              const processedIdeas = useMemo(() => {
                if (!ideasData) return [];
                return ideasData;
              }, [ideasData]);

              const filteredIdeas = useMemo(() => {
                return processedIdeas.filter(item => {
                  if (
                    filters.keyword &&
                    !item.text.toLowerCase().includes(filters.keyword.toLowerCase())
                  ) {
                    return false;
                  }
                  if (
                    filters.minVolume !== '' &&
                    (item.latestSearchVolume || 0) < Number(filters.minVolume)
                  ) {
                    return false;
                  }
                  return true;
                });
              }, [processedIdeas, filters]);

              const sortedIdeas = useMemo(() => {
                let sortableItems = [...filteredIdeas];
                if (sortConfig.key) {
                  sortableItems.sort((a, b) => {
                    let aValue, bValue;
                    if (sortConfig.key === 'competition') {
                      aValue =
                        a.competition_index != null ? Number(a.competition_index) : null;
                      bValue =
                        b.competition_index != null ? Number(b.competition_index) : null;
                    } else if (
                      [
                        'low_top_of_page_bid_micros',
                        'high_top_of_page_bid_micros',
                        'average_cpc_micros',
                      ].includes(sortConfig.key)
                    ) {
                      aValue =
                        a[sortConfig.key] != null ? Number(a[sortConfig.key]) : null;
                      bValue =
                        b[sortConfig.key] != null ? Number(b[sortConfig.key]) : null;
                    } else if (sortConfig.key === 'yoy') {
                      aValue = a.growthYoY;
                      bValue = b.growthYoY;
                    } else if (sortConfig.key === 'mom') {
                      aValue = a.growthMoM;
                      bValue = b.growthMoM;
                    } else if (sortConfig.key === 'latest_vs_avg') {
                      aValue = a.growthLatestVsAvg;
                      bValue = b.growthLatestVsAvg;
                    } else if (sortConfig.key === 'latest_vs_max') {
                      aValue = a.growthLatestVsMax;
                      bValue = b.growthLatestVsMax;
                    } else if (sortConfig.key === 'three_months_vs_avg') {
                      aValue = a.growthThreeMonthsVsAvg;
                      bValue = b.growthThreeMonthsVsAvg;
                    } else if (sortConfig.key === 'growth') {
                      // Fallback for default sort which is just 'growth' initially
                      const defaultMetric = activeMetrics[0] || 'yoy';
                      if (defaultMetric === 'yoy') {
                        aValue = a.growthYoY;
                        bValue = b.growthYoY;
                      } else if (defaultMetric === 'mom') {
                        aValue = a.growthMoM;
                        bValue = b.growthMoM;
                      } else if (defaultMetric === 'latest_vs_avg') {
                        aValue = a.growthLatestVsAvg;
                        bValue = b.growthLatestVsAvg;
                      } else if (defaultMetric === 'latest_vs_max') {
                        aValue = a.growthLatestVsMax;
                        bValue = b.growthLatestVsMax;
                      } else if (defaultMetric === 'three_months_vs_avg') {
                        aValue = a.growthThreeMonthsVsAvg;
                        bValue = b.growthThreeMonthsVsAvg;
                      }
                    } else {
                      aValue = a[sortConfig.key];
                      bValue = b[sortConfig.key];
                    }

                    if (aValue == null) return 1;
                    if (bValue == null) return -1;

                    if (aValue < bValue)
                      return sortConfig.direction === 'ascending' ? -1 : 1;
                    if (aValue > bValue)
                      return sortConfig.direction === 'ascending' ? 1 : -1;
                    return 0;
                  });
                }
                return sortableItems;
              }, [filteredIdeas, sortConfig, growthMetric]);

              // Memoize chart options to prevent re-renders/animations
              const seedChartOptions = useMemo(
                () => ({
                  responsive: true,
                  maintainAspectRatio: false,
                  plugins: {
                    legend: {
                      position: 'bottom',
                      labels: { boxWidth: 10, padding: 10 },
                    },
                    tooltip: { mode: 'index', intersect: false },
                  },
                  interaction: {
                    mode: 'nearest',
                    axis: 'x',
                    intersect: false,
                  },
                  scales: {
                    x: {
                      ticks: { color: textColor },
                      grid: { color: gridColor },
                    },
                    y: {
                      beginAtZero: true,
                      ticks: { color: textColor },
                      grid: { color: gridColor },
                    },
                  },
                }),
                [theme]
              );



              const clusterVolumeChartOptions = useMemo(
                () => ({
                  responsive: true,
                  maintainAspectRatio: false,
                  plugins: {
                    legend: { display: false },
                  },
                  scales: {
                    x: {
                      ticks: { color: textColor },
                      grid: { color: gridColor },
                    },
                    y: {
                      ticks: { color: textColor },
                      grid: { color: gridColor },
                    },
                  },
                }),
                [theme, textColor, gridColor]
              );

              const keywordVolumeChartOptions = useMemo(
                () => ({
                  responsive: true,
                  maintainAspectRatio: false,
                  plugins: {
                    legend: {
                      position: 'bottom',
                      labels: { boxWidth: 10, padding: 10 },
                    },
                    tooltip: { mode: 'index', intersect: false },
                  },
                  interaction: {
                    mode: 'nearest',
                    axis: 'x',
                    intersect: false,
                  },
                  scales: {
                    x: {
                      ticks: { color: textColor },
                      grid: { color: gridColor },
                    },
                    y: {
                      beginAtZero: true,
                      ticks: { color: textColor },
                      grid: { color: gridColor },
                    },
                  },
                }),
                [theme]
              );

              const keywordVolumeChartData = useMemo(() => {
                if (!selectedCluster || !chartLabels) return null;
                return {
                  labels: chartLabels,
                  datasets: selectedCluster.keywords.map((k, i) => {
                    const volHistory = relevantIdeas[k] ? relevantIdeas[k] : [];
                    const color = palette[i % palette.length];
                    return {
                      label: k,
                      data: volHistory.slice(),
                      borderColor: color,
                      backgroundColor: color,
                      fill: false,
                      tension: 0.3,
                      pointRadius: 2,
                      pointHoverRadius: 5,
                    };
                  }),
                };
              }, [selectedCluster, chartLabels, relevantIdeas, palette]);

              const expandedIdeaChartData = useMemo(() => {
                if (!expandedIdea || !chartLabels) return null;
                // Verify lengths match or slice
                // In ideasData, searchVolume matches months. chartLabels should match.
                return {
                  labels: chartLabels,
                  datasets: [
                    {
                      label: expandedIdea.text,
                      data: expandedIdea.searchVolume,
                      borderColor: palette[0],
                      backgroundColor: palette[0],
                      fill: false,
                      tension: 0.3,
                      pointRadius: 3,
                      pointHoverRadius: 6,
                    },
                  ],
                };
              }, [expandedIdea, chartLabels, palette]);

              const exploreModelName = geminiConfig?.modelId || 'gemini-3.1-pro-preview';

              return (
                <div className="card fade-in">
                  <div
                    style={{
                      display: 'flex',
                      justifyContent: 'space-between',
                      alignItems: 'center',
                      marginBottom: '1rem',
                    }}
                  >
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
                      <h2 style={{ marginBottom: 0 }}>Explore trending topics</h2>
                      <div style={{ fontSize: '0.8rem', color: 'var(--text-secondary)' }}>
                        Model: {exploreModelName} (<a href="#" onClick={(e) => { e.preventDefault(); onOpenSettings('EXPLORE_MODEL'); }} style={{ color: 'var(--primary)', textDecoration: 'none' }}>change</a>)
                      </div>
                    </div>
          <button
            className="btn-icon"
            onClick={() => {
              setIdeasData(null);
              setKeywords('');
              setExpandedIdea(null);
              setClusters(null);
            }}
            title="Reset Explore Data"
          >
            <span
              className="material-symbols-outlined"
              style={{ fontSize: '1.2rem' }}
            >
              delete_outline
            </span>
          </button>
        </div>
        <ChipsInput
          label={
            <div style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
              Seed Keywords
              <span
                className="material-symbols-outlined"
                style={{
                  fontSize: '1rem',
                  color: 'var(--text-secondary)',
                  cursor: 'pointer',
                }}
                onClick={e => {
                  e.preventDefault();
                  e.stopPropagation();
                  setActiveInfoModal('seed_keywords');
                }}
              >
                info
              </span>
            </div>
          }
          value={
            keywords
              ? keywords
                  .split(',')
                  .map(s => s.trim())
                  .filter(s => s)
              : []
          }
          onChange={chips => setKeywords(chips.join(', '))}
          placeholder="Type keywords (Enter/Tab to add). Press Enter again to start."
          onKeyDown={(e, newChips) => {
            if (e.key === 'Enter') {
              const keywordsToRun = newChips ? newChips.join(', ') : keywords;
              runExplore(keywordsToRun);
            }
          }}
        />
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '16px', marginBottom: '16px' }}>
          <SelectField
            label={
              <div style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                Language
                <span
                  className="material-symbols-outlined"
                  style={{
                    fontSize: '1rem',
                    color: 'var(--text-secondary)',
                    cursor: 'pointer',
                  }}
                  onClick={e => {
                    e.preventDefault();
                    e.stopPropagation();
                    setActiveInfoModal('language_info');
                  }}
                >
                  info
                </span>
              </div>
            }
            value={language}
            onChange={setLanguage}
            options={[
              ...LANGUAGES,
              ...customLanguages.map(l => ({ ...l, isCustom: true })),
            ]}
            onCustomOption={() => handleCustomOption('language')}
            onDeleteOption={id => handleCustomOption('language_delete', id)}
          />
          <SelectField
            label="Continent"
            value={continent}
            onChange={setContinent}
            options={continentOptions}
          />
          <SelectField
            label={
              <div style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                Location
                <span
                  className="material-symbols-outlined"
                  style={{
                    fontSize: '1rem',
                    color: 'var(--text-secondary)',
                    cursor: 'pointer',
                  }}
                  onClick={e => {
                    e.preventDefault();
                    e.stopPropagation();
                    setActiveInfoModal('location_info');
                  }}
                >
                  info
                </span>
              </div>
            }
            value={country}
            onChange={setCountry}
            options={
              continent === 'Custom Locations'
                ? customCountries.map(c => ({ ...c, isCustom: true }))
                : [
                    ...filteredCountries,
                    ...customCountries.map(c => ({ ...c, isCustom: true })),
                  ]
            }
            onCustomOption={() => handleCustomOption('country')}
            onDeleteOption={id => handleCustomOption('country_delete', id)}
          />
        </div>

        <details className="mb-4" ref={detailsRef}>
          <summary className="cursor-pointer text-sm font-medium text-primary">
            Advanced Config
          </summary>
          <div className="mt-4">
            <div className="mb-4">
              <label style={{ display: 'block', marginBottom: '8px' }}>
                Keyword Sources
              </label>
              <div
                style={
                  highlightKeywordSources
                    ? {
                        border: '2px solid #dc2626',
                        borderRadius: '8px',
                        padding: '4px',
                        position: 'relative',
                        width: 'fit-content',
                      }
                    : {}
                }
              >
                <div style={{ display: 'flex', gap: '16px' }}>
                  <label
                    style={{
                      display: 'flex',
                      alignItems: 'center',
                      gap: '8px',
                      cursor: 'pointer',
                    }}
                  >
                    <input
                      type="checkbox"
                      checked={useKeywordPlanner}
                      onChange={e => {
                        setUseKeywordPlanner(e.target.checked);
                        if (e.target.checked && highlightKeywordSources) {
                          setHighlightKeywordSources(false);
                        }
                      }}
                    />
                    Keyword Idea Service
                    <span
                      className="material-symbols-outlined"
                      style={{
                        fontSize: '1rem',
                        color: 'var(--text-secondary)',
                        cursor: 'pointer',
                        marginLeft: '4px',
                      }}
                      onClick={e => {
                        e.preventDefault();
                        setActiveInfoModal('keyword_planner');
                      }}
                    >
                      info
                    </span>
                  </label>
                  <label
                    style={{
                      display: 'flex',
                      alignItems: 'center',
                      gap: '8px',
                      cursor: 'pointer',
                    }}
                  >
                    <input
                      type="checkbox"
                      checked={useGemini}
                      onChange={e => {
                        setUseGemini(e.target.checked);
                        if (e.target.checked && highlightKeywordSources) {
                          setHighlightKeywordSources(false);
                        }
                      }}
                    />
                    Gemini
                    <span
                      className="material-symbols-outlined"
                      style={{
                        fontSize: '1rem',
                        color: 'var(--text-secondary)',
                        cursor: 'pointer',
                        marginLeft: '4px',
                      }}
                      onClick={e => {
                        e.preventDefault();
                        setActiveInfoModal('gemini_source');
                      }}
                    >
                      info
                    </span>
                  </label>
                </div>
                {highlightKeywordSources && (
                  <div
                    style={{
                      position: 'absolute',
                      right: '-60px',
                      top: '50%',
                      color: '#dc2626',
                      fontSize: '48px',
                      fontWeight: 'bold',
                      zIndex: 9999,
                      animation: 'bounceHorizontal 1s infinite ease-in-out',
                    }}
                  >
                    ←
                  </div>
                )}
              </div>
              {!useKeywordPlanner && !useGemini && (
                <div
                  style={{
                    color: 'var(--error)',
                    marginTop: '8px',
                    fontSize: '0.9rem',
                  }}
                >
                  At least one source needs to be selected.
                </div>
              )}
            </div>
            {useGemini && (
              <div className="mt-4">
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                    <label style={{ margin: 0 }}>Gemini Prompt</label>
                    <span
                      className="material-symbols-outlined"
                      style={{
                        fontSize: '1rem',
                        color: 'var(--text-secondary)',
                        cursor: 'pointer',
                      }}
                      onClick={e => {
                        e.preventDefault();
                        setActiveInfoModal('gemini');
                      }}
                    >
                      info
                    </span>
                  </div>
                  {geminiPrompt !== window.DEFAULT_TRENDS_PROMPT && (
                    <button
                      onClick={() => setGeminiPrompt(window.DEFAULT_TRENDS_PROMPT)}
                      className="btn btn-ghost btn-sm"
                      style={{ padding: '2px 8px', fontSize: '0.8rem', fontWeight: 'normal' }}
                    >
                      ⟳ Reset to default
                    </button>
                  )}
                </div>
                <InputField
                  type="textarea"
                  value={geminiPrompt}
                  onChange={setGeminiPrompt}
                  rows={6}
                />
              </div>
            )}
            <div className="mt-4">
              <label style={{ display: 'block', marginBottom: '8px' }}>
                Clustering
              </label>
              <div style={{ display: 'flex', gap: '16px' }}>
                <label
                  style={{
                    display: 'flex',
                    alignItems: 'center',
                    gap: '8px',
                    cursor: 'pointer',
                  }}
                >
                  <input
                    type="checkbox"
                    checked={useClustering}
                    onChange={e => setUseClustering(e.target.checked)}
                  />
                  Enable Clustering
                  <span
                    className="material-symbols-outlined"
                    style={{
                      fontSize: '1rem',
                      color: 'var(--text-secondary)',
                      cursor: 'pointer',
                      marginLeft: '4px',
                    }}
                    onClick={e => {
                      e.preventDefault();
                      setActiveInfoModal('clustering_info');
                    }}
                  >
                    info
                  </span>
                </label>
              </div>
            </div>
            {useClustering && (
              <div className="mt-4">
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                    <label style={{ margin: 0 }}>Clustering Prompt</label>
                    <span
                      className="material-symbols-outlined"
                      style={{
                        fontSize: '1rem',
                        color: 'var(--text-secondary)',
                        cursor: 'pointer',
                      }}
                      onClick={e => {
                        e.preventDefault();
                        setActiveInfoModal('clustering_info');
                      }}
                    >
                      info
                    </span>
                  </div>
                  {promptTemplate !== window.DEFAULT_PROMPT && (
                    <button
                      onClick={() => setPromptTemplate(window.DEFAULT_PROMPT)}
                      className="btn btn-ghost btn-sm"
                      style={{ padding: '2px 8px', fontSize: '0.8rem', fontWeight: 'normal' }}
                    >
                      ⟳ Reset to default
                    </button>
                  )}
                </div>
                <InputField
                  type="textarea"
                  value={promptTemplate}
                  onChange={setPromptTemplate}
                  rows={6}
                />
              </div>
            )}
          </div>
        </details>

        <button
          className="btn btn-primary"
          onClick={runExplore}
          disabled={isExploring}
        >
          {isExploring ? (
            <>
              <div className="spinner"></div> {exploreStatus || 'Running...'}
            </>
          ) : (
            <>
              <span className="material-symbols-outlined">rocket_launch</span>{' '}
              Start
            </>
          )}
        </button>

        {seedChartData && (
          <div
            className="mt-4 card"
            style={{ border: '1px solid var(--primary)' }}
          >
            <h3>Seed Keywords Search Volume</h3>
            <div style={{ height: '400px' }}>
              <ChartComponent
                type="line"
                data={seedChartData}
                options={seedChartOptions}
                theme={theme}
              />
            </div>
            {searchVolumeDisclaimer}
          </div>
        )}

        {(clusters || (ideasData && ideasData.length > 0)) && (
          <div
            className="mt-4"
            style={{
              display: 'flex',
              justifyContent: 'flex-end',
              alignItems: 'center',
            }}
          >
            <div>
              {useClustering && clusters && (
                <>
                  <button
                    className="btn btn-secondary"
                    onClick={handleDownloadExplore}

                    title="Download CSV"
                  >
                    <span className="material-symbols-outlined">download</span>
                  </button>
                  <button
                    className="btn btn-secondary"
                    onClick={handleExportExploreToSheet}
                    style={{
                      marginLeft: '8px',
                    }}
                    disabled={isExporting}
                    title="Export to Sheet"
                  >
                    {isExporting ? (
                      <div
                        className="spinner"
                        style={{
                          borderColor: 'rgba(37, 99, 235, 0.3)',
                          borderTopColor: '#2563eb',
                        }}
                      ></div>
                    ) : (
                      <span className="material-symbols-outlined">table</span>
                    )}
                  </button>
                </>
              )}
            </div>
          </div>
        )}

        {useClustering && clustersChartData && (
          <div className="mt-4">
            <h3>Clusters</h3>
            <div className="text-sm text-muted mb-2">
              Click on a bubble to view details
            </div>
            <div style={{ height: '400px' }}>
              <ChartComponent
                type="bubble"
                data={clustersChartData}
                options={bubbleChartOptions}
                theme={theme}
              />
            </div>
            {searchVolumeDisclaimer}
          </div>
        )}

        {useClustering && selectedCluster && selectedClusterChartData && (
          <div
            id="cluster-details"
            className="mt-4 card"
            style={{ border: '1px solid var(--primary)' }}
          >
            <div
              style={{
                display: 'flex',
                justifyContent: 'space-between',
                alignItems: 'center',
              }}
            >
              <h3>Details: {selectedCluster.topic}</h3>
              <button
                onClick={() => setSelectedCluster(null)}
                className="btn"
                style={{ padding: '4px 8px' }}
              >
                &times;
              </button>
            </div>
            <div className="grid-2">
              <div>
                <strong>Total Volume:</strong>{' '}
                {selectedCluster.searchVolume.toLocaleString()}
              </div>
              <div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                  {activeMetrics.map(metricId => {
                    let val = 0;
                    if (metricId === 'yoy') val = selectedCluster.growthYoY || selectedCluster.yearOverYearGrowth || 0;
                    else if (metricId === 'mom') val = selectedCluster.growthMoM || 0;
                    else if (metricId === 'latest_vs_avg') val = selectedCluster.growthLatestVsAvg || 0;
                    else if (metricId === 'latest_vs_max') val = selectedCluster.growthLatestVsMax || 0;
                    else if (metricId === 'three_months_vs_avg') val = selectedCluster.growthThreeMonthsVsAvg || 0;
                    
                    const metricName = GROWTH_METRICS.find(m => m.id === metricId)?.name || 'Growth';
                    
                    return (
                      <div key={metricId}>
                        <strong>{metricName}:</strong>{' '}
                        {val != null ? (
                          <span style={{ 
                            color: val > 0 ? 'var(--success)' : val < 0 ? 'var(--error)' : 'inherit' 
                          }}>
                            {val > 0 ? '+' : ''}{(val * 100).toFixed(1)}%
                          </span>
                        ) : '-'}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
            <div className="mt-4">
              <h4>Cluster Search Volume</h4>
              <div style={{ height: '300px' }}>
                <ChartComponent
                  type="line"
                  data={selectedClusterChartData}
                  options={clusterVolumeChartOptions}
                  theme={theme}
                />
              </div>
            </div>
            <div className="mt-4">
              <h4>Keyword Search Volume</h4>
              <div style={{ height: '400px' }}>
                <ChartComponent
                  type="line"
                  data={keywordVolumeChartData}
                  options={keywordVolumeChartOptions}
                  theme={theme}
                />
              </div>
            </div>
          </div>
        )}

        {ideasData && ideasData.length > 0 && (
          <div
            className="mt-4 card"
            style={{ border: '1px solid var(--border-color)' }}
          >
            <h3>All Keywords ({ideasData.length})</h3>
            <div
              style={{
                display: 'flex',
                gap: '16px',
                alignItems: 'flex-start',
                marginBottom: '1rem',
              }}
            >
              <div style={{ flex: 1 }}>
                <InputField
                  label="Filter by Keyword"
                  value={filters.keyword}
                  onChange={val =>
                    setFilters(prev => ({ ...prev, keyword: val }))
                  }
                  placeholder="Search..."
                />
              </div>
              <div style={{ flex: 1 }}>
                <div className="input-group">
                  <label>Growth Metrics</label>
                  <div style={{ position: 'relative' }} ref={metricsDropdownRef}>
                    <div
                      style={{
                        padding: '8px 12px',
                        border: '1px solid var(--border-color)',
                        borderRadius: '8px',
                        background: 'var(--surface-color)',
                        cursor: 'pointer',
                        display: 'flex',
                        justifyContent: 'space-between',
                        alignItems: 'center',
                        color: 'var(--text-main)',
                        minHeight: '38px',
                        boxSizing: 'border-box'
                      }}
                      onClick={() => setIsMetricsDropdownOpen(!isMetricsDropdownOpen)}
                    >
                      <span>{activeMetrics.length} selected</span>
                      <span className="material-symbols-outlined" style={{ fontSize: '1.2rem' }}>
                        {isMetricsDropdownOpen ? 'expand_less' : 'expand_more'}
                      </span>
                    </div>
                    {isMetricsDropdownOpen && (
                      <div
                        style={{
                          position: 'absolute',
                          top: '100%',
                          left: 0,
                          right: 0,
                          marginTop: '4px',
                          background: 'var(--surface-color)',
                          border: '1px solid var(--border-color)',
                          borderRadius: '8px',
                          boxShadow: 'var(--shadow-md)',
                          zIndex: 10,
                          maxHeight: '250px',
                          overflowY: 'auto',
                          padding: '8px 0',
                        }}
                      >
                        {GROWTH_METRICS.map(m => (
                          <label
                            key={m.id}
                            style={{
                              display: 'flex',
                              alignItems: 'center',
                              padding: '8px 12px',
                              cursor: 'pointer',
                              gap: '8px',
                              margin: 0,
                            }}
                          >
                            <input
                              type="checkbox"
                              checked={activeMetrics.includes(m.id)}
                              onChange={e => {
                                if (e.target.checked) {
                                  setActiveMetrics([...activeMetrics, m.id]);
                                } else {
                                  if (activeMetrics.length > 1) {
                                    setActiveMetrics(activeMetrics.filter(id => id !== m.id));
                                  }
                                }
                              }}
                            />
                            <span style={{ color: 'var(--text-main)' }}>{m.name}</span>
                          </label>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              </div>
              <div style={{ width: '150px' }}>
                <InputField
                  type="number"
                  label="Min Volume"
                  value={filters.minVolume}
                  onChange={val =>
                    setFilters(prev => ({ ...prev, minVolume: val }))
                  }
                  placeholder="e.g. 100"
                />
              </div>
            </div>
            <div style={{ overflowX: 'auto' }}>
              <table
                style={{
                  width: '100%',
                  borderCollapse: 'collapse',
                  marginTop: '10px',
                  fontSize: '0.9rem',
                }}
              >
                <thead>
                  <tr
                    style={{
                      borderBottom: '2px solid var(--border-color)',
                      color: 'var(--text-secondary)',
                    }}
                  >
                    <th
                      style={{
                        textAlign: 'left',
                        padding: '8px',
                        cursor: 'pointer',
                      }}
                      onClick={() => requestSort('text')}
                    >
                      Keyword{getSortIndicator('text')}
                    </th>
                    <th
                      style={{
                        textAlign: 'right',
                        padding: '8px',
                        cursor: 'pointer',
                      }}
                      onClick={() => requestSort('latestSearchVolume')}
                    >
                      Search Vol{getSortIndicator('latestSearchVolume')}
                    </th>
                    {activeMetrics.map(metricId => (
                      <th
                        key={metricId}
                        style={{
                          textAlign: 'right',
                          padding: '8px',
                          cursor: 'pointer',
                          minWidth: '100px',
                        }}
                        onClick={() => requestSort(metricId)}
                      >
                        {GROWTH_METRICS.find(m => m.id === metricId)?.name || metricId}
                        {getSortIndicator(metricId)}
                      </th>
                    ))}
                    <th
                      style={{
                        textAlign: 'left',
                        padding: '8px',
                        cursor: 'pointer',
                      }}
                      onClick={() => requestSort('competition')}
                    >
                      Competition{getSortIndicator('competition')}
                    </th>
                    <th
                      style={{
                        textAlign: 'right',
                        padding: '8px',
                        cursor: 'pointer',
                      }}
                      onClick={() => requestSort('low_top_of_page_bid_micros')}
                    >
                      Low Bid
                      {getSortIndicator('low_top_of_page_bid_micros')}
                    </th>
                    <th
                      style={{
                        textAlign: 'right',
                        padding: '8px',
                        cursor: 'pointer',
                      }}
                      onClick={() => requestSort('high_top_of_page_bid_micros')}
                    >
                      High Bid
                      {getSortIndicator('high_top_of_page_bid_micros')}
                    </th>
                    <th
                      style={{
                        textAlign: 'right',
                        padding: '8px',
                        cursor: 'pointer',
                      }}
                      onClick={() => requestSort('average_cpc_micros')}
                    >
                      Avg CPC{getSortIndicator('average_cpc_micros')}
                    </th>
                  </tr>
                </thead>
                <tbody>
                  {sortedIdeas.map((item, index) => {
                    const text = item.text;
                    const vol = item.latestSearchVolume;
                    const comp = item.competition;
                    const idx = item.competition_index;
                    const low = item.low_top_of_page_bid_micros;
                    const high = item.high_top_of_page_bid_micros;
                    const cpc = item.average_cpc_micros;

                    const formatMoney = micros =>
                      micros != null
                        ? (micros / 1000000).toLocaleString('en-US', {
                            style: 'currency',
                            currency: 'USD',
                          })
                        : '-';

                    return (
                      <React.Fragment key={index}>
                        <tr
                          style={{
                            borderBottom: '1px solid var(--border-color)',
                            cursor: 'pointer',
                            backgroundColor:
                              expandedIdea?.text === text
                                ? 'rgba(37, 99, 235, 0.05)'
                                : 'transparent',
                          }}
                          onClick={() =>
                            setExpandedIdea(
                              expandedIdea?.text === text ? null : item
                            )
                          }
                        >
                          <td style={{ padding: '8px' }}>
                            <div
                              style={{
                                display: 'flex',
                                alignItems: 'center',
                                gap: '8px',
                              }}
                            >
                              <span
                                className="material-symbols-outlined"
                                style={{
                                  fontSize: '1.2rem',
                                  color: 'var(--primary)',
                                  transition: 'transform 0.2s',
                                  transform:
                                    expandedIdea?.text === text
                                      ? 'rotate(90deg)'
                                      : 'rotate(0deg)',
                                }}
                              >
                                chevron_right
                              </span>
                              {text}
                            </div>
                          </td>
                          <td
                            style={{
                              padding: '8px',
                              textAlign: 'right',
                            }}
                          >
                            {vol != null ? vol.toLocaleString() : '-'}
                          </td>
                          {activeMetrics.map(metricId => {
                            let growth = 0;
                            if (metricId === 'yoy') growth = item.growthYoY || 0;
                            else if (metricId === 'mom') growth = item.growthMoM || 0;
                            else if (metricId === 'latest_vs_avg') growth = item.growthLatestVsAvg || 0;
                            else if (metricId === 'latest_vs_max') growth = item.growthLatestVsMax || 0;
                            else if (metricId === 'three_months_vs_avg') growth = item.growthThreeMonthsVsAvg || 0;
                            
                            return (
                              <td
                                key={metricId}
                                style={{
                                  padding: '8px',
                                  textAlign: 'right',
                                  color:
                                    growth > 0
                                      ? 'var(--success)'
                                      : growth < 0
                                        ? 'var(--error)'
                                        : 'inherit',
                                }}
                              >
                                {growth > 0 ? '+' : ''}
                                {(growth * 100).toFixed(1)}%
                              </td>
                            );
                          })}
                          <td style={{ padding: '8px' }}>
                            {comp ? `${comp} (${idx ?? '-'})` : '-'}
                          </td>
                          <td
                            style={{
                              padding: '8px',
                              textAlign: 'right',
                            }}
                          >
                            {formatMoney(low)}
                          </td>
                          <td
                            style={{
                              padding: '8px',
                              textAlign: 'right',
                            }}
                          >
                            {formatMoney(high)}
                          </td>
                          <td
                            style={{
                              padding: '8px',
                              textAlign: 'right',
                            }}
                          >
                            {formatMoney(cpc)}
                          </td>
                        </tr>
                        {expandedIdea?.text === text && (
                          <tr
                            style={{
                              backgroundColor: 'rgba(37, 99, 235, 0.05)',
                            }}
                          >
                            <td colSpan={6 + activeMetrics.length} style={{ padding: '16px' }}>
                              <div className="grid-2 mb-4">
                                <div>
                                  <strong>Total Volume:</strong>{' '}
                                  {expandedIdea.latestSearchVolume?.toLocaleString() ??
                                    '-'}
                                </div>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                                  {activeMetrics.map(metricId => {
                                    let val = 0;
                                    if (metricId === 'yoy') val = expandedIdea.growthYoY || 0;
                                    else if (metricId === 'mom') val = expandedIdea.growthMoM || 0;
                                    else if (metricId === 'latest_vs_avg') val = expandedIdea.growthLatestVsAvg || 0;
                                    else if (metricId === 'latest_vs_max') val = expandedIdea.growthLatestVsMax || 0;
                                    else if (metricId === 'three_months_vs_avg') val = expandedIdea.growthThreeMonthsVsAvg || 0;
                                    
                                    const metricName = GROWTH_METRICS.find(m => m.id === metricId)?.name || 'Growth';
                                    
                                    return (
                                      <div key={metricId}>
                                        <strong>{metricName}:</strong>{' '}
                                        <span style={{ 
                                          color: val > 0 ? 'var(--success)' : val < 0 ? 'var(--error)' : 'inherit' 
                                        }}>
                                          {val > 0 ? '+' : ''}{(val * 100).toFixed(1)}%
                                        </span>
                                      </div>
                                    );
                                  })}
                                </div>
                              </div>
                              {expandedIdeaChartData ? (
                                <div>
                                  <div style={{ height: '300px' }}>
                                    <ChartComponent
                                      type="line"
                                      data={expandedIdeaChartData}
                                      options={{
                                        responsive: true,
                                        maintainAspectRatio: false,
                                        plugins: {
                                          legend: { display: false },
                                        },
                                        scales: {
                                          x: {
                                            ticks: {
                                              autoSkip: false,
                                            },
                                          },
                                          y: {
                                            beginAtZero: true,
                                          },
                                        },
                                      }}
                                    />
                                  </div>
                                  {searchVolumeDisclaimer}
                                </div>
                              ) : (
                                <div
                                  className="text-muted"
                                  style={{
                                    padding: '20px',
                                    background: '#f1f5f9',
                                    borderRadius: '8px',
                                    textAlign: 'center',
                                  }}
                                >
                                  No historical data available.
                                </div>
                              )}
                            </td>
                          </tr>
                        )}
                      </React.Fragment>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {activeInfoModal && (
          <Modal
            isOpen={!!activeInfoModal}
            onClose={() => setActiveInfoModal(null)}
            title={{
              keyword_planner: 'Keyword Idea Service',
              gemini_source: 'Gemini',
              gemini: 'Gemini Prompt',
              seed_keywords: 'Seed Keywords',
              location_info: 'Location Settings',
              clustering_info: 'Clustering Info',
            }[activeInfoModal] || 'Language Settings'}
          >
            {(() => {
              switch (activeInfoModal) {
                case 'keyword_planner':
                  return (
                    <div>
                      <p>
                        The{' '}
                        <a
                          href="https://developers.google.com/google-ads/api/docs/keyword-planning/generate-keyword-ideas"
                          target="_blank"
                          rel="noopener noreferrer"
                          style={{ color: 'var(--primary)' }}
                        >
                          Keyword Idea Service
                        </a>{' '}
                        uses the Google Ads API to generate keyword ideas based on
                        your seed keywords, location, and language settings.
                      </p>
                    </div>
                  );
                case 'gemini_source':
                  return (
                    <div>
                      <p>
                        Gemini is used to generate trending keywords based on your
                        seed keywords.
                      </p>
                      <p>
                        The Google Ads{' '}
                        <a
                          href="https://developers.google.com/google-ads/api/docs/keyword-planning/generate-historical-metrics"
                          target="_blank"
                          rel="noopener noreferrer"
                          style={{ color: 'var(--primary)' }}
                        >
                          Historical Metrics
                        </a>{' '}
                        service is then used to retrieve their historical search volume.
                      </p>
                      <p>
                        Google Search is used for grounding to get the latest
                        trends.
                      </p>
                    </div>
                  );
                case 'gemini':
                  return (
                    <div>
                      {promptCustomizationNote('Gemini Prompt')}
                    </div>
                  );
                case 'seed_keywords':
                  return (
                    <div>
                      <p>
                        Enter one or more starting keywords here. These serve as the
                        foundation for generating new keyword ideas and clusters.
                      </p>
                      <p>
                        Type keywords and press <strong>Enter</strong> or <strong>Tab</strong> to add them. Press <strong>Enter</strong> again to start.
                      </p>
                      <p>
                        The tool will use these seeds to find related search terms and
                        historical data to help expand your keyword research.
                      </p>
                      <div style={{ marginTop: '1rem', fontSize: '0.8rem', color: 'var(--text-secondary)', borderTop: '1px solid var(--border-color)', paddingTop: '0.5rem' }}>
                        <p style={{ marginBottom: '4px' }}>
                          * Gemini may display inaccurate info, so double-check its responses.
                        </p>
                        <p>
                          * Keyword Planner may not return results for keywords that violate <a href="https://support.google.com/adspolicy/answer/6008942" target="_blank" rel="noopener noreferrer" style={{ color: 'inherit', textDecoration: 'underline' }}>Google Ads Policies</a>.
                        </p>
                      </div>
                    </div>
                  );
                case 'location_info':
                  return (
                    <div>
                      <p>Select the geographic location for your keyword research.</p>
                      <p>
                        The tool will only retrieve search volume and historical
                        metrics specific to this location.
                      </p>
                      <div style={{ marginTop: '1rem', fontSize: '0.8rem', color: 'var(--text-secondary)', borderTop: '1px solid var(--border-color)', paddingTop: '0.5rem' }}>
                        <p style={{ marginBottom: '4px' }}>
                          * When adding a custom location, use city level or higher (e.g., City, State, Country).
                        </p>
                        <p>
                          * Locations lower than city level (e.g., postal codes, specific neighborhoods) often result in sparse or no data being returned. <a href="https://developers.google.com/google-ads/api/reference/data/geotargets" target="_blank" rel="noopener noreferrer" style={{ color: 'inherit', textDecoration: 'underline' }}>Learn more about geo targets</a>.
                        </p>
                      </div>
                    </div>
                  );
                case 'clustering_info':
                  return (
                    <div>
                      <p>
                        Clustering groups keywords into related categories based on
                        semantic similarity. This helps you organize your target keywords
                        into efficient ad groups or content themes.
                      </p>
                      <p>
                        Gemini is used to perform a semantic clustering based on the
                        prompt. You can guide the clustering by telling Gemini what to focus on,
                        such as <strong>colors</strong>, <strong>materials</strong>, <strong>brands</strong>, or <strong>user intent</strong>.
                      </p>
                      {promptCustomizationNote('Clustering Prompt')}
                    </div>
                  );
                default:
                  return (
                    <div>
                      <p>
                        Select the language for the <strong>Keyword Ideas</strong> you want to generate.
                      </p>
                      <p>
                        <strong>Important:</strong> Ensure this matches the language of your{' '}
                        <strong>Seed Keywords</strong>.
                      </p>
                      <p>
                        The Keyword Idea Service uses this setting to find relevant
                        keywords in the specified language. Mismatched languages
                        (e.g., English keywords with &quot;German&quot; selected) will likely
                        yield poor or no results.
                      </p>
                    </div>
                  );
              }
            })()}
          </Modal>
        )}
      </div>
    );
  };
</script>
