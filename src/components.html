<script type="text/babel">
  const { useState, useEffect, useRef, useMemo } = React;

  window.TabButton = ({ active, onClick, children }) => (
    <button
      className={`tab-btn ${active ? 'active' : ''}`}
      onClick={onClick}
    >
      {children}
    </button>
  );

  window.InputField = ({
    label,
    type = 'text',
    value,
    onChange,
    placeholder,
    rows,
    helpText,
    onKeyDown,
    style
  }) => (
    <div className="input-group" style={style}>
      <label>{label}</label>
      {type === 'textarea' ? (
        <textarea
          rows={rows || 4}
          value={value}
          onChange={e => onChange(e.target.value)}
          placeholder={placeholder}
          onKeyDown={onKeyDown}
        />
      ) : (
        <input
          type={type}
          value={value}
          onChange={e => onChange(e.target.value)}
          placeholder={placeholder}
          onKeyDown={onKeyDown}
        />
      )}
      {helpText && (
        <div className="text-sm text-muted mt-1">{helpText}</div>
      )}
    </div>
  );

  window.ChipsInput = ({
    label,
    value = [], // Array of strings
    onChange,   // (newChips: string[]) => void
    placeholder,
    helpText,
    onKeyDown,
  }) => {
    const [inputValue, setInputValue] = useState('');

    const addChip = (text) => {
      const trimmed = text.trim();
      if (trimmed) {
        if (!value.includes(trimmed)) {
          const nextValue = [...value, trimmed];
          onChange(nextValue);
          setInputValue('');
          return nextValue;
        }
        setInputValue('');
      }
      return value;
    };

    const handleKeyDown = (e) => {
      if (['Tab', ','].includes(e.key)) {
        e.preventDefault();
        addChip(inputValue);
      } else if (e.key === 'Enter') {
        const trimmed = inputValue.trim();
        if (trimmed) {
           e.preventDefault();
           addChip(inputValue);
        } else {
            if (onKeyDown) {
                 onKeyDown(e, value);
            }
        }
      } else if (e.key === 'Backspace' && !inputValue && value.length > 0) {
        onChange(value.slice(0, -1));
      }
    };

    const handleBlur = () => {
      addChip(inputValue);
    };

    const removeChip = (indexToRemove) => {
      onChange(value.filter((_, index) => index !== indexToRemove));
    };

    return (
      <div className="input-group">
        <label>{label}</label>
        <div className="chips-container" onClick={() => document.getElementById('chips-input').focus()}>
          {value.map((chip, index) => (
            <div key={index} className="chip">
              {chip}
              <span className="material-symbols-outlined close-icon" onClick={(e) => { e.stopPropagation(); removeChip(index); }}>close</span>
            </div>
          ))}
          <input
            id="chips-input"
            type="text"
            value={inputValue}
            onChange={(e) => setInputValue(e.target.value)}
            onKeyDown={handleKeyDown}
            onBlur={handleBlur}
            placeholder={value.length === 0 ? placeholder : ''}
            className="chips-input-field"
          />
        </div>
        {helpText && <div className="text-sm text-muted mt-1">{helpText}</div>}
      </div>
    );
  };

  window.Modal = ({
    isOpen,
    onClose,
    title,
    children,
    className = '',
    maxWidth = '',
    showCloseButton = true,
  }) => {
    const overlayRef = useRef(null);
    const onCloseRef = useRef(onClose);

    useEffect(() => {
      onCloseRef.current = onClose;
    }, [onClose]);

    useEffect(() => {
      if (!isOpen) return;
      const handleEsc = event => {
        if (event.key === 'Escape' && overlayRef.current) {
          const overlays = Array.from(document.querySelectorAll('.modal-overlay'));
          if (overlays.length > 0 && overlays[overlays.length - 1] === overlayRef.current) {
            event.stopImmediatePropagation();
            onCloseRef.current();
          }
        }
      };
      window.addEventListener('keydown', handleEsc, true);
      return () => window.removeEventListener('keydown', handleEsc, true);
    }, [isOpen]);

    if (!isOpen) return null;
    return (
      <div className="modal-overlay" ref={overlayRef} onClick={onClose}>
        <div
          className={`modal-content ${className}`}
          onClick={e => e.stopPropagation()}
          style={maxWidth ? { maxWidth } : undefined}
        >
          <div className="modal-header">
            <h2>{title}</h2>
            {showCloseButton && (
              <button className="close-btn" onClick={onClose}>
                <span className="material-symbols-outlined">close</span>
              </button>
            )}
          </div>
          {children}
        </div>
      </div>
    );
  };

  window.ErrorModal = ({ isOpen, onClose, error }) => {
    const overlayRef = useRef(null);
    const onCloseRef = useRef(onClose);

    useEffect(() => {
      onCloseRef.current = onClose;
    }, [onClose]);

    useEffect(() => {
      if (!isOpen) return;
      const handleEsc = event => {
        if (event.key === 'Escape' && overlayRef.current) {
          const overlays = Array.from(document.querySelectorAll('.modal-overlay'));
          if (overlays.length > 0 && overlays[overlays.length - 1] === overlayRef.current) {
            event.stopImmediatePropagation();
            onCloseRef.current();
          }
        }
      };
      window.addEventListener('keydown', handleEsc, true);
      return () => window.removeEventListener('keydown', handleEsc, true);
    }, [isOpen]);

    if (!isOpen || !error) return null;

    const copyToClipboard = () => {
      const text = `Error: ${error.title}\nMessage: ${error.message}\n\nStack Trace:\n${error.stack || 'N/A'}`;
      navigator.clipboard.writeText(text).then(() => {
        // Optional: Show a temporary "Copied!" tooltip or state
      });
    };

    return (
      <div className="modal-overlay" ref={overlayRef} onClick={onClose}>
        <div
          className="modal-content error-modal-content"
          onClick={e => e.stopPropagation()}
        >
          <div className="error-header">
            <span className="material-symbols-outlined error-icon">
              error_outline
            </span>
            <h2 className="error-title">
              {error.title || 'An error occurred'}
            </h2>
          </div>

          <div className="error-body">
            <p className="error-message">{error.message}</p>
            {error.stack && (
              <div className="error-details">{error.stack}</div>
            )}
          </div>

          <div className="error-actions">
            <button className="btn btn-secondary" onClick={copyToClipboard}>
              <span className="material-symbols-outlined">
                content_copy
              </span>
              Copy Details
            </button>
            <button className="btn btn-primary" onClick={onClose}>
              Close
            </button>
          </div>
        </div>
      </div>
    );
  };

  window.SelectField = ({
    label,
    value,
    onChange,
    options,
    onCustomOption,
    onDeleteOption,
  }) => {
    const [isOpen, setIsOpen] = useState(false);
    const containerRef = useRef(null);

    const selectedOption = options.find(opt => opt.id === value);

    useEffect(() => {
      const handleClickOutside = event => {
        if (
          containerRef.current &&
          !containerRef.current.contains(event.target)
        ) {
          setIsOpen(false);
        }
      };
      document.addEventListener('mousedown', handleClickOutside);
      return () => {
        document.removeEventListener('mousedown', handleClickOutside);
      };
    }, []);

    const handleSelect = id => {
      onChange(id);
      setIsOpen(false);
    };

    const handleDelete = (e, id) => {
      e.stopPropagation();
      if (onDeleteOption) {
        onDeleteOption(id);
      }
    };

    return (
      <div className="input-group" ref={containerRef}>
        <label>{label}</label>
        <div className="select-wrapper">
          <div
            className={`custom-select ${isOpen ? 'active' : ''}`}
            onClick={() => setIsOpen(!isOpen)}
          >
            <span>{selectedOption ? selectedOption.name : 'Select...'}</span>
            <span className="material-symbols-outlined">
              {isOpen ? 'expand_less' : 'expand_more'}
            </span>
          </div>
          {isOpen && (
            <div className="select-dropdown">
              {options.map(opt => (
                <div
                  key={opt.id}
                  className={`select-option ${opt.id === value ? 'selected' : ''}`}
                  onClick={() => handleSelect(opt.id)}
                >
                  <span>{opt.name}</span>
                  {onDeleteOption && opt.isCustom && (
                    <button
                      className="btn-icon delete-btn"
                      onClick={e => handleDelete(e, opt.id)}
                      title="Remove custom option"
                    >
                      <span
                        className="material-symbols-outlined"
                        style={{ fontSize: '1rem' }}
                      >
                        close
                      </span>
                    </button>
                  )}
                </div>
              ))}
              {onCustomOption && (
                <div
                  className="select-option custom-divider"
                  onClick={() => {
                    onCustomOption();
                    setIsOpen(false);
                  }}
                >
                  <span className="material-symbols-outlined">add</span>
                  Add Custom...
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    );
  };

  window.ChartComponent = ({ type, data, options, theme }) => {
    const canvasRef = useRef(null);
    const chartRef = useRef(null);

    useEffect(() => {
      if (canvasRef.current) {
        if (chartRef.current) chartRef.current.destroy();
        chartRef.current = new Chart(canvasRef.current, {
          type,
          data,
          options,
        });
      }
      return () => {
        if (chartRef.current) chartRef.current.destroy();
      };
    }, [type, data, options, theme]);

    return (
      <div className="chart-container" style={{ position: 'relative', height: '100%', width: '100%' }}>
        <canvas ref={canvasRef} />
      </div>
    );
  };

  window.SettingsModal = ({
    isOpen,
    onClose,
    modalConfig,
    geminiConfig,
    minSearchVolume,
    configStatus,
    onSave,
    onClearCache,
    isEffectiveUser,
  }) => {
    const [localGeminiConfig, setLocalGeminiConfig] =
      useState(geminiConfig);
    const [localMinSearchVolume, setLocalMinSearchVolume] =
      useState(minSearchVolume);
    const [localAdsId, setLocalAdsId] = useState(
      configStatus.adsAccountId || ''
    );
    const [localDevToken, setLocalDevToken] = useState('');
    const [localSpreadsheetUrl, setLocalSpreadsheetUrl] = useState('');
    const [isSaving, setIsSaving] = useState(false);
    const [infoModalOpen, setInfoModalOpen] = useState(false);
    const adsInputRef = useRef(null);

    // Sync with props when modal opens
    useEffect(() => {
      if (isOpen) {
        setLocalGeminiConfig(geminiConfig);
        setLocalMinSearchVolume(minSearchVolume);
        setLocalSpreadsheetUrl(modalConfig.spreadsheetUrl || '');
        setLocalAdsId(configStatus.adsAccountId || '');
        setLocalDevToken('');
      }
    }, [
      isOpen,
      geminiConfig,
      minSearchVolume,
      configStatus,
      modalConfig.spreadsheetUrl,
    ]);

    // Focus Ads Account ID if highlighted
    useEffect(() => {
      if (
        isOpen &&
        (modalConfig.highlight === 'ADS_ACCOUNT_ID' ||
          modalConfig.highlight === 'BOTH') &&
        adsInputRef.current
      ) {
        setTimeout(() => {
          adsInputRef.current.focus();
        }, 100);
      }
    }, [isOpen, modalConfig.highlight]);

    const insightsModelRef = useRef(null);
    useEffect(() => {
      if (isOpen && modalConfig.highlight === 'INSIGHTS_MODEL' && insightsModelRef.current) {
        setTimeout(() => {
          insightsModelRef.current.focus();
          insightsModelRef.current.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 100);
      }
    }, [isOpen, modalConfig.highlight]);

    const exploreModelRef = useRef(null);
    useEffect(() => {
      if (isOpen && modalConfig.highlight === 'EXPLORE_MODEL' && exploreModelRef.current) {
        setTimeout(() => {
          exploreModelRef.current.focus();
          exploreModelRef.current.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 100);
      }
    }, [isOpen, modalConfig.highlight]);

    const handleSave = async () => {
      setIsSaving(true);
      try {
        await onSave({
          geminiConfig: localGeminiConfig,
          minSearchVolume: localMinSearchVolume,
          adsAccountId: localAdsId,
          devToken: localDevToken,
          spreadsheetUrl: localSpreadsheetUrl,
        });
      } catch (error) {
        console.error('Failed to save settings', error);
      } finally {
        setIsSaving(false);
      }
    };

    return (
      <React.Fragment>
      <Modal
        isOpen={isOpen}
        onClose={onClose}
        title="Settings"
        maxWidth="700px"
        showCloseButton={false}
      >
        <div className="modal-body">
          {modalConfig.message && (
            <div
              className="alert alert-warning mb-4"
              style={{
                color: '#dc2626',
                background: '#fee2e2',
                padding: '10px',
                borderRadius: '6px',
                fontSize: '0.9rem',
                border: '1px solid #fca5a5',
              }}
            >
              {modalConfig.message}
            </div>
          )}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
            <div className="input-group">
              <label style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                Exploration Model
                <span
                  className="material-symbols-outlined"
                  style={{
                    fontSize: '1rem',
                    color: 'var(--text-secondary)',
                    cursor: 'pointer',
                  }}
                  onClick={e => {
                    e.preventDefault();
                    setInfoModalOpen('exploration_model');
                  }}
                  title="Learn more about Gemini models used for exploratory analysis"
                >
                  info
                </span>
              </label>
              <div
                className="select-wrapper"
                style={
                  modalConfig.highlight === 'EXPLORE_MODEL'
                    ? {
                        border: '2px solid #dc2626',
                        borderRadius: '8px',
                        padding: '4px',
                        position: 'relative',
                      }
                    : {}
                }
              >
                <select
                  ref={exploreModelRef}
                  value={localGeminiConfig.modelId}
                  onChange={e =>
                    setLocalGeminiConfig({
                      ...localGeminiConfig,
                      modelId: e.target.value,
                    })
                  }
                >
                  <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro</option>
                  <option value="gemini-3-flash-preview">Gemini 3 Flash</option>
                  <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 Flash Lite</option>
                </select>
                {modalConfig.highlight === 'EXPLORE_MODEL' && (
                  <div
                    style={{
                      position: 'absolute',
                      right: '-60px',
                      top: '50%',
                      color: '#dc2626',
                      fontSize: '48px',
                      fontWeight: 'bold',
                      zIndex: 9999,
                      animation:
                        'bounceHorizontal 1s infinite ease-in-out',
                    }}
                  >
                    ←
                  </div>
                )}
              </div>
            </div>
            <div className="input-group">
              <label style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                Insights Model
                <span
                  className="material-symbols-outlined"
                  style={{
                    fontSize: '1rem',
                    color: 'var(--text-secondary)',
                    cursor: 'pointer',
                  }}
                  onClick={e => {
                    e.preventDefault();
                    setInfoModalOpen('insights_model');
                  }}
                  title="Learn more about Gemini models used for generating insights"
                >
                  info
                </span>
              </label>
              <div
                className="select-wrapper"
                style={
                  modalConfig.highlight === 'INSIGHTS_MODEL'
                    ? {
                        border: '2px solid #dc2626',
                        borderRadius: '8px',
                        padding: '4px',
                        position: 'relative',
                      }
                    : {}
                }
              >
                <select
                  ref={insightsModelRef}
                  value={localGeminiConfig.insightsModelId || 'gemini-3-flash-preview'}
                  onChange={e =>
                    setLocalGeminiConfig({
                      ...localGeminiConfig,
                      insightsModelId: e.target.value,
                    })
                  }
                >
                  <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro</option>
                  <option value="gemini-3-flash-preview">Gemini 3 Flash</option>
                  <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 Flash Lite</option>
                </select>
                {modalConfig.highlight === 'INSIGHTS_MODEL' && (
                  <div
                    style={{
                      position: 'absolute',
                      right: '-60px',
                      top: '50%',
                      color: '#dc2626',
                      fontSize: '48px',
                      fontWeight: 'bold',
                      zIndex: 9999,
                      animation:
                        'bounceHorizontal 1s infinite ease-in-out',
                    }}
                  >
                    ←
                  </div>
                )}
              </div>
            </div>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
            <div className="input-group">
              <label style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                Image Model
                <span
                  className="material-symbols-outlined"
                  style={{
                    fontSize: '1rem',
                    color: 'var(--text-secondary)',
                    cursor: 'pointer',
                  }}
                  onClick={e => {
                    e.preventDefault();
                    setInfoModalOpen('image_model');
                  }}
                  title="Learn more about Gemini models used for generating images"
                >
                  info
                </span>
              </label>
              <div className="select-wrapper">
                <select
                  value={localGeminiConfig.imageModelId || 'gemini-3.1-flash-image-preview'}
                  onChange={e =>
                    setLocalGeminiConfig({
                      ...localGeminiConfig,
                      imageModelId: e.target.value,
                    })
                  }
                >
                  <option value="gemini-3.1-flash-image-preview">Gemini 3.1 Flash Image</option>
                  <option value="gemini-3-pro-image-preview">Gemini 3 Pro Image</option>
                </select>
              </div>
            </div>
            <div className="input-group">
              <label style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                Location
                <span
                  className="material-symbols-outlined"
                  style={{
                    fontSize: '1rem',
                    color: 'var(--text-secondary)',
                    cursor: 'pointer',
                  }}
                  onClick={e => {
                    e.preventDefault();
                    setInfoModalOpen('location');
                  }}
                  title="Learn more about Vertex AI region locations"
                >
                  info
                </span>
              </label>
              <input
                type="text"
                value={localGeminiConfig.location || 'global'}
                onChange={e =>
                  setLocalGeminiConfig({
                    ...localGeminiConfig,
                    location: e.target.value,
                  })
                }
                placeholder="e.g. global, us-central1, europe-west3"
              />
            </div>
          </div>


          <hr
            style={{
              margin: '20px 0',
              border: '0',
              borderTop: '1px solid var(--border-color)',
            }}
          />
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
            <div className="input-group">
              <label style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                Min Search Volume
                <span
                  className="material-symbols-outlined"
                  style={{
                    fontSize: '1rem',
                    color: 'var(--text-secondary)',
                    cursor: 'pointer',
                  }}
                  onClick={e => {
                    e.preventDefault();
                    setInfoModalOpen('min_search_volume');
                  }}
                  title="Keywords below this search volume are skipped for clustering and analysis."
                >
                  info
                </span>
              </label>
              <input
                type="number"
                value={localMinSearchVolume}
                onChange={e =>
                  setLocalMinSearchVolume(Number(e.target.value))
                }
                placeholder="100"
              />
            </div>

            <div className="input-group">
              <label>Export Spreadsheet URL</label>
              <input
                type="text"
                value={localSpreadsheetUrl}
                onChange={e => setLocalSpreadsheetUrl(e.target.value)}
                placeholder="https://docs.google.com/spreadsheets/d/..."
              />
              <div className="text-sm text-muted mt-1">
                Note: The spreadsheet must be shared with{' '}
                <strong>{USER_EMAIL}</strong> with edit permissions.
              </div>
            </div>
          </div>

          <hr
            style={{
              margin: '20px 0',
              border: '0',
              borderTop: '1px solid var(--border-color)',
            }}
          />
          <div className="input-group">
            <label>Application Data</label>
            <div
              style={{ display: 'flex', alignItems: 'center', gap: '10px' }}
            >
              <button
                className="btn"
                onClick={() => {
                  onClearCache();
                  onClose();
                }}
                style={{
                  width: '40px',
                  height: '40px',
                  padding: '0',
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  background: '#f3f4f6',
                  color: '#4b5563',
                  border: '1px solid #e5e7eb',
                  borderRadius: '8px',
                  flexShrink: 0,
                }}
                title="Clear Cache"
              >
                <span
                  className="material-symbols-outlined"
                  style={{ fontSize: '1.2rem' }}
                >
                  delete_outline
                </span>
              </button>
              <div className="text-sm text-muted">
                Removes all locally saved data and resets the application
                state.
              </div>
            </div>
          </div>

          <hr
            style={{
              margin: '20px 0',
              border: '0',
              borderTop: '1px solid var(--border-color)',
            }}
          />

          {isEffectiveUser === true && (
          <details
            className="advanced-settings"
            open={!!modalConfig.highlight}
            style={{
              background: 'var(--bg-color)',
              padding: '15px',
              borderRadius: '8px',
              border: '1px solid var(--border-color)',
            }}
          >
            <summary
              style={{
                color: 'var(--text-main)',
                cursor: 'pointer',
                display: 'flex',
                alignItems: 'center',
                gap: '8px',
                fontSize: '1rem',
                fontWeight: 'bold',
              }}
            >
              <span
                className="material-symbols-outlined"
                style={{ fontSize: '1.2rem' }}
              >
                expand_more
              </span>
              <span
                className="material-symbols-outlined"
                style={{ fontSize: '1.2rem' }}
              >
                settings
              </span>
              Advanced Settings
            </summary>
            <div className="mt-4">
              <div className="input-group">
                <label style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                  Ads Account ID
                  <span
                    className="material-symbols-outlined"
                    style={{
                      fontSize: '1rem',
                      color: 'var(--text-secondary)',
                      cursor: 'pointer',
                    }}
                    onClick={e => {
                      e.preventDefault();
                      setInfoModalOpen('ads_account_id');
                    }}
                    title="Learn more about the Google Ads Account ID"
                  >
                    info
                  </span>
                </label>
                <div
                  style={
                    modalConfig.highlight === 'ADS_ACCOUNT_ID' ||
                    modalConfig.highlight === 'BOTH'
                      ? {
                          border: '2px solid #dc2626',
                          borderRadius: '8px',
                          padding: '4px',
                          position: 'relative',
                        }
                      : {}
                  }
                >
                  <input
                    ref={adsInputRef}
                    type="text"
                    value={localAdsId}
                    onChange={e => setLocalAdsId(e.target.value)}
                    placeholder="e.g. 123-456-7890"
                    style={{ width: '100%', boxSizing: 'border-box' }}
                  />
                  {(modalConfig.highlight === 'ADS_ACCOUNT_ID' ||
                    modalConfig.highlight === 'BOTH') && (
                    <div
                      style={{
                        position: 'absolute',
                        right: '-60px',
                        top: '50%',
                        color: '#dc2626',
                        fontSize: '48px',
                        fontWeight: 'bold',
                        zIndex: 9999,
                        animation:
                          'bounceHorizontal 1s infinite ease-in-out',
                      }}
                    >
                      ←
                    </div>
                  )}
                </div>
              </div>
              <div className="input-group">
                <label style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                  Developer Token
                  <span
                    className="material-symbols-outlined"
                    style={{
                      fontSize: '1rem',
                      color: 'var(--text-secondary)',
                      cursor: 'pointer',
                    }}
                    onClick={e => {
                      e.preventDefault();
                      setInfoModalOpen('developer_token');
                    }}
                    title="Learn more about the Google Ads Developer Token"
                  >
                    info
                  </span>
                </label>
                <div
                  style={
                    modalConfig.highlight === 'DEVELOPER_TOKEN' ||
                    modalConfig.highlight === 'BOTH'
                      ? {
                          border: '2px solid #dc2626',
                          borderRadius: '8px',
                          padding: '4px',
                          position: 'relative',
                        }
                      : {}
                  }
                >
                  <input
                    type="text"
                    value={localDevToken}
                    onChange={e => setLocalDevToken(e.target.value)}
                    placeholder={
                      configStatus.hasDeveloperToken
                        ? 'Token is set (hidden for safety). Type to update.'
                        : 'Enter Developer Token'
                    }
                    style={{ width: '100%', boxSizing: 'border-box' }}
                  />
                  {(modalConfig.highlight === 'DEVELOPER_TOKEN' ||
                    modalConfig.highlight === 'BOTH') && (
                    <div
                      style={{
                        position: 'absolute',
                        right: '-60px',
                        top: '50%',
                        color: '#dc2626',
                        fontSize: '48px',
                        fontWeight: 'bold',
                        zIndex: 9999,
                        animation:
                          'bounceHorizontal 1s infinite ease-in-out',
                      }}
                    >
                      ←
                    </div>
                  )}
                </div>
              </div>
            </div>
          </details>
          )}
          <div className="modal-actions" style={{ justifyContent: 'space-between', alignItems: 'center' }}>
            <div style={{ fontSize: '0.8rem', color: '#9ca3af' }}>
              Version: {APP_VERSION}
            </div>
            <div style={{ display: 'flex', gap: '8px' }}>
              <button className="btn" onClick={onClose} disabled={isSaving}>
                Cancel
              </button>
              <button
                className="btn btn-primary"
                onClick={handleSave}
                disabled={isSaving}
              >
                {isSaving ? 'Saving...' : 'Save'}
              </button>
            </div>
          </div>
        </div>
      </Modal>

      {infoModalOpen && (
        <Modal
          isOpen={!!infoModalOpen}
          onClose={() => setInfoModalOpen(null)}
          title={
            {
              min_search_volume: 'Min Search Volume',
              exploration_model: 'Exploration Model',
              insights_model: 'Insights Model',
              image_model: 'Image Model',
              location: 'Location',
              ads_account_id: 'Ads Account ID',
              developer_token: 'Developer Token'
            }[infoModalOpen] || 'Settings Info'
          }
        >
          <div>
            {infoModalOpen === 'min_search_volume' && (
              <p>
                Keywords with an average monthly search volume below this threshold will be excluded from the analysis and clustering process. This helps focus the tool on higher-volume terms and reduces unnecessary API calls.
              </p>
            )}
            {infoModalOpen === 'exploration_model' && (
              <p>
                The Exploration Model is used in the "Explore" tab to suggest related keywords, find geographic criteria IDs, and perform intelligent clustering of keyword groups based on search data.
                <br /><br />
                <a href="https://cloud.google.com/vertex-ai/generative-ai/docs/learn/models" target="_blank" rel="noopener noreferrer">Learn more about Gemini models in Vertex AI</a>.
              </p>
            )}
            {infoModalOpen === 'insights_model' && (
              <p>
                The Insights Model is used in the "Insights" tab to generate the comprehensive marketing reports and powers the ongoing chat analysis functionality.
                <br /><br />
                <a href="https://cloud.google.com/vertex-ai/generative-ai/docs/learn/models" target="_blank" rel="noopener noreferrer">Learn more about Gemini models in Vertex AI</a>.
              </p>
            )}
            {infoModalOpen === 'image_model' && (
              <p>
                The Image Model is used to generate images for the agentic insights follow-up chat, creating visual assets directly based on data analysis requests.
                <br /><br />
                <a href="https://cloud.google.com/vertex-ai/generative-ai/docs/image/overview" target="_blank" rel="noopener noreferrer">Learn more about Imagen models in Vertex AI</a>.
              </p>
            )}
            {infoModalOpen === 'location' && (
              <p>
                This determines the Google Cloud region where the Gemini models are executed. It is needed to route requests to the correct Vertex AI endpoint.
                <br /><br />
                <a href="https://cloud.google.com/vertex-ai/generative-ai/docs/learn/locations" target="_blank" rel="noopener noreferrer">Learn more about Vertex AI geographic locations</a>.
              </p>
            )}
            {infoModalOpen === 'ads_account_id' && (
              <p>
                The Google Ads Account ID is required by the Google Ads API to fetch keyword ideas and search volume history using the Keyword Planner. 
                <br /><br />
                <a href="https://support.google.com/google-ads/answer/1704344" target="_blank" rel="noopener noreferrer">Learn how to find your Google Ads Account ID</a>.
                <br /><br />
                <a href="https://developers.google.com/google-ads/api/docs/keyword-planning/generate-keyword-ideas" target="_blank" rel="noopener noreferrer">Learn more about the Google Ads Keyword Planner API</a>.
              </p>
            )}
            {infoModalOpen === 'developer_token' && (
              <p>
                The Developer Token provides programmatic access to the Google Ads API. It is strictly required to execute Keyword Planner volume queries.
                <br /><br />
                <a href="https://developers.google.com/google-ads/api/docs/get-started/dev-token" target="_blank" rel="noopener noreferrer">Learn how to obtain a Developer Token</a>.
              </p>
            )}
          </div>
        </Modal>
      )}
      </React.Fragment>
    );
  };

  window.AdPreview = ({ adData }) => {
    const [h1Index, setH1Index] = useState(0);
    const [h2Index, setH2Index] = useState(1);
    const [dIndex, setDIndex] = useState(0);

    const headlines = adData?.headlines || [];
    const descriptions = adData?.descriptions || [];

    const randomize = () => {
      if (headlines.length > 0) {
        const r1 = Math.floor(Math.random() * headlines.length);
        let r2 = Math.floor(Math.random() * headlines.length);
        // Try to get a different second headline if possible
        if (headlines.length > 1) {
          while (r2 === r1) {
            r2 = Math.floor(Math.random() * headlines.length);
          }
        }
        setH1Index(r1);
        setH2Index(r2);
      }
      if (descriptions.length > 0) {
        setDIndex(Math.floor(Math.random() * descriptions.length));
      }
    };

    useEffect(() => {
      randomize();
    }, [adData]);

    if (!adData || headlines.length === 0) return null;

    return (
      <div className="ad-preview">
        <div className="ad-url">
          <span className="ad-label">Ad</span>
          www.example.com
        </div>
        <div className="ad-headline">
          <a
            href="#"
            onClick={e => e.preventDefault()}
            style={{ color: '#1a0dab', textDecoration: 'none' }}
          >
            {headlines[h1Index]}{' '}
            {headlines.length > 1 && `| ${headlines[h2Index]}`}
          </a>
          <div className="preview-controls">
            <button
              className="control-btn"
              onClick={randomize}
              title="Shuffle Headlines"
            >
              <span
                className="material-symbols-outlined"
                style={{ fontSize: '14px' }}
              >
                shuffle
              </span>
            </button>
          </div>
        </div>
        <div className="ad-description">
          {descriptions[dIndex]}
          <div className="preview-controls">
            <button
              className="control-btn"
              onClick={randomize}
              title="Shuffle Description"
            >
              <span
                className="material-symbols-outlined"
                style={{ fontSize: '14px' }}
              >
                shuffle
              </span>
            </button>
          </div>
        </div>
      </div>
    );
  };
</script>
